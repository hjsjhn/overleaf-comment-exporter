<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Overleaf Comment Exporter</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Comment Exporter</h1>
      <div id="project-name" class="project-name"></div>
    </header>

    <div id="toolbar" class="toolbar hidden">
      <label class="select-all">
        <input type="checkbox" id="select-all">
        <span>Select All</span>
      </label>
      <span id="count" class="count"></span>
      <button id="invert-btn" class="btn-icon" title="Invert selection">&#x21c4;</button>
      <button id="refresh-btn" class="btn-icon" title="Refresh">&#x21bb;</button>
    </div>

    <div id="time-filter" class="time-filter hidden">
      <label class="time-filter-label">Select after</label>
      <input type="datetime-local" id="time-cutoff">
      <button id="time-apply" class="btn-sm">Apply</button>
    </div>

    <div id="content"></div>

    <div id="actions" class="actions hidden">
      <button id="export-md" class="btn" disabled>Export Markdown</button>
      <button id="export-json" class="btn" disabled>Export JSON</button>
      <button id="export-csv" class="btn" disabled>Export CSV</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
